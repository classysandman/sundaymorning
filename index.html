<!DOCTYPE html>
<html>
  <head>
    <title>Sunday Checker</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: sans-serif;
        background: #0d1117;
        color: white;
      }

      .result-box {
        display: inline-block;
        padding: 16px 32px;
        font-size: 28px;
        font-weight: bold;
        border: 3px solid white;
        border-radius: 16px;
      }
    </style>
  </head>
  <body>
    <div class="result-box" id="result"></div>
    <script>
      const day = new Date().getDay();
      const result = document.getElementById("result");

      if (day === 0) {
        result.textContent = "Today is Sunday!";
      } else if (day === 6) {
        result.textContent = "Tomorrow is Sunday!";
      } else {
        result.textContent = "Today is not Sunday.";
      }
    </script>
  </body>
</html>
