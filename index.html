<!DOCTYPE html>
<html>
  <head>
    <title>Sunday Checker</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: sans-serif;
        background: #0d1117;
        color: white;
      }

      .container {
        text-align: center;
      }

      button {
        margin-top: 20px;
        padding: 12px 32px;
        font-size: 18px;
        background: transparent;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: white;
        color: #0d1117;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 id="result"></h1>
      <button onclick="check()">Check</button>
    </div>
    <script>
      function check() {
        const day = new Date().getDay();
        const result = document.getElementById("result");

        if (day === 0) {
          result.textContent = "Today is Sunday!";
        } else if (day === 6) {
          result.textContent = "Tomorrow is Sunday!";
        } else {
          result.textContent = "Today is not Sunday.";
        }
      }

      check();
    </script>
  </body>
</html>
